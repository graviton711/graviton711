name: GitHub 3D Contribution Calendar

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution calendar
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: graviton711
          MAX_REPOS: 10
          SETTING_JSON: |
            {
              "githubUserName": "graviton711",
              "totalCommits": true,
              "fileName": "profile-3d-contrib/profile-night-rainbow.svg",
              "backgroundColor": "#0d1117",
              "foregroundColor": "#ffffff",
              "contributionColorArray": ["#1e1b4b", "#4C1D95", "#7C3AED", "#F472B6", "#22D3EE"],
              "contribTypeName": [
                { "type": "commit", "color": "#F472B6" },
                { "type": "issue", "color": "#A78BFA" },
                { "type": "pullReq", "color": "#22D3EE" },
                { "type": "review", "color": "#EC4899" }
              ]
            }

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: profile-3d-contrib
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
