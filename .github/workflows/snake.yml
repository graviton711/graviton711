name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:       # allows manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          # Light variant — white/transparent background, Aemeth palette
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=F472B6&color_dots[]=F1F5F9,F9A8D4,F472B6,DB2777,22C5D8
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=F472B6&color_dots[]=1e293b,4d2060,9333ea,F472B6,22C5D8

      - name: Push output to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
